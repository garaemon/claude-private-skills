# Copy to ~/.config/org-deepsearch/config.toml and edit the paths.
# All paths must be absolute (no "~" — expand it beforehand).
#
# Fields overlap with ~/.config/org-graduate/config.toml on purpose;
# you can copy shared values across, or keep one authoritative file
# and symlink this one to it.

# Root of the org directory (the git repo that holds your org files).
org_dir = "/home/USER/ghq/github.com/USER/org"

# The org-roam directory (one file per roam node). New research notes
# are written here as YYYYMMDDHHMMSS-slug.org files.
roam_dir = "/home/USER/ghq/github.com/USER/org/org-roam"

# The org-roam SQLite database. Used only to check whether a node on
# the requested topic already exists (de-duplication).
roam_db = "/home/USER/.emacs.d/org-roam.db"

# Base filetags prepended to every generated node. Keeping a marker
# like "deepsearch" makes AI-researched nodes easy to grep later.
# Topical tags (per-node) are appended on top of this base.
default_filetags = ["deepsearch"]

# How many top results per WebSearch query the skill records. Keep
# this small so search cost stays predictable; you can always ask
# the skill to widen on demand.
default_web_results_per_query = 5

# How many related papers (arXiv abstracts) the skill cites at most.
default_paper_results = 5

# ---------------------------------------------------------------------
# Apply mode (optional): only needed when you ask the skill to write
# files and open a PR. Dry-run ignores these fields.
# ---------------------------------------------------------------------

# Git identity used for apply-mode commits. The skill passes these
# values via GIT_COMMITTER_* / GIT_AUTHOR_* env vars at commit time —
# your global git config is NOT modified.
bot_name = "USER-bot"
bot_email = "USER+githubbot@example.com"

# Remote and base branch on the org repo. The skill will push the
# feature branch to pr_remote and open the PR against pr_base_branch.
pr_remote = "origin"
pr_base_branch = "main"
