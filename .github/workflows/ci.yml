name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !REVIEW.md
            !**/templates/**

  readme-skills-link:
    name: README links all skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/check-readme-skills.py

  shellcheck:
    name: Shellcheck shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          shopt -s globstar nullglob
          # gws-secure has no .sh extension; gws-secure-bootstrap is Python and
          # is intentionally excluded.
          scripts=(
            .claude/skills/**/*.sh
            scripts/gws-secure
            scripts/tests/gws-secure-smoke.sh
          )
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No shell scripts to check."
            exit 0
          fi
          shellcheck "${scripts[@]}"

  gws-secure-smoke:
    name: gws-secure smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke test
        run: bash scripts/tests/gws-secure-smoke.sh

  spotify-sheets-image:
    name: Build spotify-sheets image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t spotify-sheets:local .claude/skills/spotify-sheets
      - name: Smoke test image
        run: bash .claude/skills/spotify-sheets/tests/smoke.sh

  add-paper-from-url-image:
    name: Build add-paper-from-url image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t add-paper-from-url:local .claude/skills/add-paper-from-url
      - name: Smoke test image
        run: bash .claude/skills/add-paper-from-url/tests/smoke.sh

  npm-audit:
    name: npm audit (spotify-sheets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Audit production dependencies
        working-directory: .claude/skills/spotify-sheets
        run: npm audit --omit=dev --audit-level=high

  slack-post-image:
    name: Build slack-post image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t slack-post:local .claude/skills/slack-post
      - name: Smoke test image
        run: bash .claude/skills/slack-post/tests/smoke.sh

  npm-audit-slack-post:
    name: npm audit (slack-post)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Audit production dependencies
        working-directory: .claude/skills/slack-post
        run: npm audit --omit=dev --audit-level=high

  pdf2zh-image:
    name: Build pdf2zh image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t pdf2zh:local .claude/skills/pdf2zh
      - name: Smoke test image
        run: bash .claude/skills/pdf2zh/tests/smoke.sh

  pip-audit:
    name: pip audit (pdf2zh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      # pdf2zh 1.9.11 hard-pins many transitive deps that carry published
      # advisories, and the pins cannot be bumped until upstream does. We run
      # pdf2zh only as a batch CLI (see skills/pdf2zh/run.sh): a positional PDF
      # plus `-s gemini:<model>`, never `pdf2zh -i`, inside a container started
      # with --read-only (only an ephemeral /tmp tmpfs is writable), --cap-drop
      # ALL, --security-opt no-new-privileges, --network bridge, --memory 2g
      # --cpus 1.0, as non-root, with the input PDF mounted read-only and the
      # output directory as the sole writable host mount. Each group below adds
      # an assessment of why the advisories are not exploitable (or are
      # acceptably contained) under that usage. Revisit on every pdf2zh bump.
      - name: Audit lockfile
        working-directory: .claude/skills/pdf2zh
        run: |
          ignore=(
            # gradio — the whole Gradio web server is never started (CLI-only
            # invocation), so every advisory that needs an attacker to reach the
            # running UI/server is unreachable dead code in our usage.
            CVE-2026-28414       # gradio: absolute path traversal on Windows (Python 3.13+)
            CVE-2026-27167       # gradio: mocked OAuth login leaks creds via hardcoded session secret
            CVE-2026-28416       # gradio: SSRF via crafted proxy_url in gr.load() (we never call gr.load)
            CVE-2026-28415       # gradio: open redirect in OAuth flow
            PYSEC-2026-211       # gradio: weak hash in audio cache key handler
            CVE-2026-48545       # gradio: cookie injection vulnerability
            PYSEC-2026-2179      # gradio: FileExplorer path traversal (CVE-2026-49119); fix 6.16.0 blocked by pdf2zh pin gradio<5.36

            # starlette / python-multipart / msgpack — same reason: only
            # exercised while serving HTTP through the Gradio web stack, which we
            # never launch. There is no inbound request path to reach them.
            PYSEC-2026-161       # starlette: missing Host header validation poisons request.url.path
            CVE-2026-48817       # starlette: arbitrary HTTP method dispatch via getattr
            CVE-2026-48818       # starlette: StaticFiles UNC SSRF / NTLM theft on Windows
            CVE-2026-54282       # starlette: unvalidated request path poisons request.url.hostname
            CVE-2026-54283       # starlette: form limits ignored for urlencoded bodies (DoS)
            CVE-2026-53537       # python-multipart: Content-Disposition param smuggling (RFC 2231/5987)
            CVE-2026-53538       # python-multipart: param smuggling via semicolon querystring separator
            CVE-2026-53539       # python-multipart: quadratic-time querystring parsing (CPU DoS)
            CVE-2026-53540       # python-multipart: negative Content-Length buffers whole body (DoS)
            CVE-2026-42561       # python-multipart: unbounded multipart part headers (DoS)
            GHSA-6v7p-g79w-8964  # msgpack: use-after-free reusing Unpacker after error (web-serialization path only)

            # aiohttp — server-side advisories need the never-started web server;
            # client-side ones need an attacker-controlled redirect target, but
            # pdf2zh's only outbound calls go to the trusted Gemini API endpoint
            # (input is a local PDF path, never a URL we follow).
            CVE-2026-47265       # aiohttp: cross-origin redirect leaks per-request cookies
            CVE-2026-34993       # aiohttp: deserialization of untrusted data
            CVE-2026-50269       # aiohttp: CRLF injection in multipart headers
            CVE-2026-54273       # aiohttp: unbounded HTTP/1 pipelined request queue (DoS)
            CVE-2026-54274       # aiohttp: incomplete websocket frames bypass memory limits
            CVE-2026-54275       # aiohttp: TLS hostname override ignored on reused HTTPS connections
            CVE-2026-54276       # aiohttp: DigestAuth credentials leaked on cross-origin redirect
            CVE-2026-54277       # aiohttp: C parser bypasses max_line_size on fragmented lines
            CVE-2026-54278       # aiohttp: unread compressed bodies bypass client_max_size (DoS)
            CVE-2026-54279       # aiohttp: host-only cookies become domain cookies after persistence
            CVE-2026-54280       # aiohttp: resource leak on mid-body disconnect

            # urllib3 / cryptography / idna — reachable only through outbound
            # HTTPS, and pdf2zh only ever connects to the trusted Gemini
            # endpoint, so there is no malicious redirect, TLS peer, or hostname
            # to trigger the header leak, OpenSSL OOB read, or idna encode bypass.
            PYSEC-2026-142       # urllib3: decompression bomb via partial read / drain_conn (DoS)
            PYSEC-2026-141       # urllib3: sensitive headers forwarded on proxied cross-origin redirect
            GHSA-537c-gmf6-5ccf  # cryptography: bundled OpenSSL out-of-bounds read in wheels
            PYSEC-2026-215       # idna: crafted idna.encode() input bypasses CVE-2024-3651 fix

            # pdfminer.six — the pickle/RCE bugs fire only if an attacker can
            # plant a malicious CMap .pickle on disk for pdfminer to load; they
            # are NOT reachable from data inside the PDF. The read-only rootfs
            # (package dir immutable) plus a fresh per-run /tmp tmpfs leave no
            # writable path to poison, so a malicious input PDF cannot trigger them.
            CVE-2025-70559       # pdfminer.six: insecure pickle deserialization in CMap loader
            CVE-2025-64512       # pdfminer.six: arbitrary code execution via crafted PDF CMap pickle
            PYSEC-2026-2389      # babeldoc: same CMap pickle bug in its vendored pdfminer copy (CVE-2026-54071); fix 0.6.3 blocked by pdf2zh pin babeldoc<0.3.0

            # pillow — the one genuinely reachable surface: pdf2zh decodes images
            # embedded in the input PDF, so a crafted image can hit these. Blast
            # radius is contained: non-root, --cap-drop ALL, no-new-privileges,
            # read-only rootfs, input mounted :ro, and the --memory/--cpus caps
            # bound the DoS variants; a crash dies with the throwaway container.
            # Several also need niche formats (FITS/PSD/PCF/BDF/GD) rare in real
            # PDFs, or APIs pdf2zh never calls (font compile, image .show(),
            # ImageCms transforms). The fix release 12.3.0 is unreachable while
            # gradio pins pillow<12.0; residual risk accepted until that pin moves.
            CVE-2026-25990       # pillow: out-of-bounds write loading PSD images
            CVE-2026-40192       # pillow: FITS GZIP decompression bomb (DoS)
            PYSEC-2026-165       # pillow: integer overflow in font glyph advance (CVE-2026-42308)
            CVE-2026-42309       # pillow: heap buffer overflow with nested list coordinates
            CVE-2026-42310       # pillow: PDF parsing trailer infinite loop (DoS)
            CVE-2026-42311       # pillow: out-of-bounds write via invalid PSD tile extents
            PYSEC-2026-2253      # pillow: PCF font glyph dimension OOB read (CVE-2026-54059)
            PYSEC-2026-2254      # pillow: FontFile.compile() combined-bitmap overflow (CVE-2026-54060)
            PYSEC-2026-2255      # pillow: BDF font BBX dimension OOB read (CVE-2026-55379)
            PYSEC-2026-2256      # pillow: GD header dimensions heap overflow (CVE-2026-55380)
            PYSEC-2026-2257      # pillow: WindowsViewer .show() shell injection, Windows-only (CVE-2026-55798)
            PYSEC-2026-3451      # pillow: coordinate APIs near-INT_MAX heap OOB write (CVE-2026-59199)
            PYSEC-2026-3453      # pillow: ImageCms transform heap corruption (CVE-2026-59205)
          )
          args=()
          for vuln in "${ignore[@]}"; do
            args+=(--ignore-vuln "$vuln")
          done
          pip-audit --require-hashes -r requirements.txt \
            --vulnerability-service osv "${args[@]}"
