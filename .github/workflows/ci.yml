name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !REVIEW.md

  readme-skills-link:
    name: README links all skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/check-readme-skills.py

  shellcheck:
    name: Shellcheck shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          shopt -s globstar nullglob
          # gws-secure has no .sh extension; gws-secure-bootstrap is Python and
          # is intentionally excluded.
          scripts=(
            .claude/skills/**/*.sh
            scripts/gws-secure
            scripts/tests/gws-secure-smoke.sh
          )
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No shell scripts to check."
            exit 0
          fi
          shellcheck "${scripts[@]}"

  gws-secure-smoke:
    name: gws-secure smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke test
        run: bash scripts/tests/gws-secure-smoke.sh

  spotify-sheets-image:
    name: Build spotify-sheets image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t spotify-sheets:local .claude/skills/spotify-sheets
      - name: Smoke test image
        run: bash .claude/skills/spotify-sheets/tests/smoke.sh

  add-paper-from-url-image:
    name: Build add-paper-from-url image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t add-paper-from-url:local .claude/skills/add-paper-from-url
      - name: Smoke test image
        run: bash .claude/skills/add-paper-from-url/tests/smoke.sh

  npm-audit:
    name: npm audit (spotify-sheets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Audit production dependencies
        working-directory: .claude/skills/spotify-sheets
        run: npm audit --omit=dev --audit-level=high

  slack-post-image:
    name: Build slack-post image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t slack-post:local .claude/skills/slack-post
      - name: Smoke test image
        run: bash .claude/skills/slack-post/tests/smoke.sh

  npm-audit-slack-post:
    name: npm audit (slack-post)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Audit production dependencies
        working-directory: .claude/skills/slack-post
        run: npm audit --omit=dev --audit-level=high

  pdf2zh-image:
    name: Build pdf2zh image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t pdf2zh:local .claude/skills/pdf2zh
      - name: Smoke test image
        run: bash .claude/skills/pdf2zh/tests/smoke.sh

  pip-audit:
    name: pip audit (pdf2zh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      # pdf2zh 1.9.11 hard-pins several transitive deps (pdfminer-six==20250416,
      # pillow 11.3.0, gradio 5.35.0, and the gradio web stack: aiohttp,
      # starlette, python-multipart, urllib3, idna, cryptography, msgpack) that
      # carry published CVEs. Our usage runs in a --read-only, --cap-drop=ALL,
      # --network=bridge container and never launches the Gradio web UI, so the
      # CVEs below are accepted under our threat model. Bumping them directly is
      # not possible while pdf2zh pins them, so they stand until pdf2zh publishes
      # a release that bumps these pins. Revisit on every pdf2zh bump.
      - name: Audit lockfile
        working-directory: .claude/skills/pdf2zh
        run: |
          pip-audit --require-hashes -r requirements.txt \
            --vulnerability-service osv \
            --ignore-vuln CVE-2026-28414 \
            --ignore-vuln CVE-2026-27167 \
            --ignore-vuln CVE-2026-28416 \
            --ignore-vuln CVE-2026-28415 \
            --ignore-vuln CVE-2026-25990 \
            --ignore-vuln CVE-2026-40192 \
            --ignore-vuln CVE-2025-70559 \
            --ignore-vuln CVE-2025-64512 \
            --ignore-vuln CVE-2026-47265 \
            --ignore-vuln CVE-2026-34993 \
            --ignore-vuln CVE-2026-50269 \
            --ignore-vuln CVE-2026-54273 \
            --ignore-vuln CVE-2026-54274 \
            --ignore-vuln CVE-2026-54275 \
            --ignore-vuln CVE-2026-54276 \
            --ignore-vuln CVE-2026-54277 \
            --ignore-vuln CVE-2026-54278 \
            --ignore-vuln CVE-2026-54279 \
            --ignore-vuln CVE-2026-54280 \
            --ignore-vuln GHSA-537c-gmf6-5ccf \
            --ignore-vuln PYSEC-2026-211 \
            --ignore-vuln PYSEC-2026-165 \
            --ignore-vuln CVE-2026-42309 \
            --ignore-vuln CVE-2026-42310 \
            --ignore-vuln CVE-2026-42311 \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln CVE-2026-48817 \
            --ignore-vuln CVE-2026-48818 \
            --ignore-vuln CVE-2026-54282 \
            --ignore-vuln CVE-2026-54283 \
            --ignore-vuln PYSEC-2026-215 \
            --ignore-vuln GHSA-6v7p-g79w-8964 \
            --ignore-vuln CVE-2026-53537 \
            --ignore-vuln CVE-2026-53538 \
            --ignore-vuln CVE-2026-53539 \
            --ignore-vuln CVE-2026-53540 \
            --ignore-vuln CVE-2026-42561 \
            --ignore-vuln PYSEC-2026-142 \
            --ignore-vuln PYSEC-2026-141 \
            --ignore-vuln CVE-2026-48545
